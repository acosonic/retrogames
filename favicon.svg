<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9dd3c"/><stop offset="1" stop-color="#e0b80c"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe9f3"/><stop offset="1" stop-color="#5fa6cd"/>
    </linearGradient>
  </defs>

  <!-- kuciste (full-bleed za maskable) -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#case)"/>
  <rect x="0" y="0" width="512" height="512" rx="104" fill="none" stroke="#b9970c" stroke-width="6"/>

  <!-- LCD ekran -->
  <rect x="74" y="92" width="364" height="300" rx="26" fill="#101010"/>
  <rect x="86" y="104" width="340" height="276" rx="18" fill="url(#water)"/>

  <!-- morsko dno -->
  <path d="M86,330 q40,-12 85,0 q45,12 85,0 q40,-12 85,0 q40,10 85,0 L426,380 L86,380 Z" fill="#c79a5b"/>
  <path d="M150,332 q-9,-16 0,-30 q9,-12 0,-22" fill="none" stroke="#2f9e5a" stroke-width="7" stroke-linecap="round"/>
  <path d="M360,332 l0,-26 M360,318 q-12,-6 -16,-20 M360,322 q12,-6 16,-22" fill="none" stroke="#d6453a" stroke-width="8" stroke-linecap="round"/>

  <!-- povrsina vode -->
  <path d="M86,140 q22,-8 44,0 q22,8 44,0 q22,-8 44,0 q22,8 44,0 q22,-8 44,0 q22,8 44,0 q22,-8 44,0"
        fill="none" stroke="#2f7fb0" stroke-width="6" stroke-linecap="round" opacity=".6"/>

  <!-- ronilac (roni glavom nadole) -->
  <g fill="#0e2630" transform="translate(168,196) rotate(38)">
    <circle cx="0" cy="20" r="9"/>
    <rect x="-5" y="-12" width="10" height="30" rx="5"/>
    <rect x="-2" y="6" width="22" height="7" rx="3" transform="rotate(28)"/>
    <rect x="-20" y="6" width="22" height="7" rx="3" transform="rotate(-28)"/>
    <rect x="-6" y="-26" width="8" height="18" rx="3" transform="rotate(18)"/>
    <rect x="-2" y="-26" width="8" height="18" rx="3" transform="rotate(-18)"/>
  </g>

  <!-- podmornica -->
  <g fill="#0e2630">
    <ellipse cx="256" cy="300" rx="92" ry="32"/>
    <rect x="230" y="250" width="52" height="30" rx="9"/>
    <rect x="250" y="228" width="9" height="24"/>
    <rect x="250" y="224" width="22" height="8" rx="2"/>
    <path d="M348,283 L390,300 L348,317 Z"/>
    <path d="M164,283 L122,292 L140,300 L122,308 L164,317 Z"/>
    <rect x="113" y="289" width="7" height="22" rx="2"/>
    <circle cx="222" cy="300" r="11" fill="url(#water)"/>
    <circle cx="262" cy="300" r="11" fill="url(#water)"/>
  </g>

  <!-- mehurici -->
  <g fill="#ffffff" opacity=".8">
    <circle cx="316" cy="206" r="7"/><circle cx="332" cy="184" r="5"/><circle cx="344" cy="166" r="3.5"/>
  </g>
