<style>
  :root{
    --body-1:#f6d62a;  --body-2:#e3bd0f;
    --grip-1:#3a3a3a;  --grip-2:#181818;
    --wing:#f1f1ee;
    --banner:#1f7fc4;
    --red:#d8352a;  --red-d:#9c2018;
    --lcd-bg-1:#cfe9f3; --lcd-bg-2:#7fb8d7;
    --lcd-ink:#0e2630;
    --label:#155a78;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{margin:0;min-height:100dvh;padding:16px;
    background:radial-gradient(circle at 50% 25%, #34343a, #131316 70%);
    font-family:"Arial Narrow",Arial,sans-serif;color:#eee;
    display:flex;align-items:center;justify-content:center;}

  /* ---------- KUCISTE ---------- */
  .device{width:min(720px,97vw);
    background:linear-gradient(#fbfbf9,#dcdcd6);border-radius:54px;padding:16px;
    display:flex;align-items:stretch;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.8), 0 22px 50px rgba(0,0,0,.6), 0 0 0 2px #c7c7c0;}
  .grip{width:clamp(66px,15vw,118px);
    background:linear-gradient(160deg,var(--grip-1),var(--grip-2));border-radius:20px;padding:14px 6px;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:12px;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.12), inset 0 -4px 8px rgba(0,0,0,.5);}
  .decals{display:flex;flex-direction:column;gap:22px;font-size:34px;line-height:1;text-align:center;margin-top:18px;}
  .decals span{display:block;}
  .center{flex:1;margin:0 -8px;z-index:2;
    background:linear-gradient(160deg,var(--body-1),var(--body-2));border-radius:18px;padding:12px 14px 16px;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.5), inset 0 -4px 10px rgba(0,0,0,.25), 0 0 0 2px #b9970c;}
  .notes{display:flex;justify-content:center;gap:10px;font-size:16px;opacity:.8;margin-bottom:8px;
    color:#b9300f;letter-spacing:1px;}

  /* ---------- LCD ---------- */
  .screen-frame{background:linear-gradient(160deg,#2b2b2b,#0e0e0e);border-radius:10px;padding:12px;
    box-shadow:inset 0 3px 8px rgba(0,0,0,.7);}
  .screen{position:relative;border-radius:5px;overflow:hidden;
    background:radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.25), rgba(255,255,255,0) 55%),
      linear-gradient(165deg,var(--lcd-bg-1),var(--lcd-bg-2));
    box-shadow:inset 0 0 22px rgba(20,60,80,.45);}
  .screen svg{display:block;width:100%;height:auto;}
  .screen::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(115deg, rgba(255,255,255,.28) 0%, rgba(255,255,255,0) 22%),
      radial-gradient(130% 120% at 50% 40%, rgba(0,0,0,0) 60%, rgba(10,40,55,.25) 100%);
    mix-blend-mode:screen;}

  .lcd-seg{fill:var(--lcd-ink);opacity:.11;filter:blur(.25px);transition:opacity .03s;}
  .lcd-seg.on{opacity:.9;}
  .sea-sand{fill:#c79a5b;opacity:.85;}
  .sea-rock{fill:#a87b3e;opacity:.7;}
  .sea-coral{fill:none;stroke:#d6453a;stroke-width:6;stroke-linecap:round;opacity:.8;}
  .sea-weed{fill:none;stroke:#2f9e5a;stroke-width:5;stroke-linecap:round;opacity:.7;}
  .sea-surf{fill:none;stroke:#2f7fb0;stroke-width:3;stroke-linecap:round;opacity:.45;}
  .lcd-label{fill:var(--label);font:700 12px Arial;letter-spacing:1px;opacity:.9;}
  .lcd-msg{fill:var(--lcd-ink);font:900 28px Arial;letter-spacing:3px;text-anchor:middle;opacity:0;transition:opacity .15s;}
  .lcd-msg.on{opacity:.92;}
  .lcd-msg.blink{animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:.1;}}

  .banner{margin:12px auto 0;width:max-content;background:var(--banner);
    color:#ffe14d;font:900 22px Arial;letter-spacing:6px;padding:5px 18px;border-radius:7px;
    text-shadow:1px 1px 0 #0a4a78;box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 2px 4px rgba(0,0,0,.3);}
  .bars{display:flex;justify-content:center;gap:40px;margin-top:12px;}
  .bartn{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .bartn small{color:#0c6a3f;font:700 11px Arial;letter-spacing:1px;}

  .rbtn{border:none;cursor:pointer;background:linear-gradient(160deg,var(--red),var(--red-d));
    box-shadow:0 5px 0 #5e120c, inset 0 2px 0 rgba(255,255,255,.3);
    transition:transform .04s, box-shadow .04s;color:#fff;user-select:none;}
  .rbtn:active{transform:translateY(4px);box-shadow:0 1px 0 #5e120c, inset 0 2px 0 rgba(255,255,255,.3);}
  .rbtn.round{width:clamp(52px,11vw,68px);height:clamp(52px,11vw,68px);border-radius:50%;font:900 20px Arial;}
  .rbtn.pill{width:54px;height:22px;border-radius:6px;}
  .glabel{color:#7a3a06;font:700 11px Arial;margin-top:6px;letter-spacing:1px;text-align:center;}
  .hint{text-align:center;font-size:11px;color:#7a3a06;opacity:.85;margin-top:10px;}

  /* PWA install dugme (vidljivo samo kad je instalacija moguća) */
  .install-fab{position:fixed;top:12px;right:12px;z-index:50;border:none;cursor:pointer;
    background:#1f7fc4;color:#fff;font:700 13px Arial;letter-spacing:.4px;
    padding:9px 15px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.45);
    -webkit-tap-highlight-color:transparent;}
  .install-fab:active{transform:translateY(1px);}
  .install-fab[hidden]{display:none;}

  /* ---------- MOBILNI (uspravni telefon): bez bočnih ukrasa, ekran preko cele širine ---------- */
  /* ---------- MOBILNI: uspravno žuto telo (kao torpedo) — bez crnih hvataljki/ukrasa,
       LEFT/RIGHT na žutom okviru ispod ekrana ---------- */
  @media (max-width:600px){
    html,body{max-width:100%;overflow-x:hidden;}
    body{padding:10px;}
    /* žuto telo igrice; ekran preko cele širine (red 1), LEFT|RIGHT na okviru (red 2) */
    .device{display:flex;flex-wrap:wrap;flex-direction:row;align-items:center;
      width:100%;max-width:460px;margin:0 auto;padding:14px 14px 16px;border-radius:26px;gap:8px;
      background:linear-gradient(160deg,var(--body-1),var(--body-2));
      box-shadow:inset 0 2px 0 rgba(255,255,255,.5), inset 0 -4px 10px rgba(0,0,0,.25),
        0 0 0 2px #b9970c, 0 18px 40px rgba(0,0,0,.55);}
    .decals,.notes{display:none;}                 /* bez ukrasnih sličica/nota */
    .center{flex:0 0 100%;min-width:0;order:0;margin:0;padding:0;
      background:transparent;box-shadow:none;}    /* ekran preko cele širine */
    .screen-frame{padding:10px;}                   /* tamni okvir ekrana ostaje (kao torpedo) */
    .banner{margin-top:12px;}
    .bars{margin-top:10px;gap:34px;}
    .hint{font-size:11px;margin-top:8px;overflow-wrap:anywhere;}
    /* LEFT / RIGHT — na žutom okviru (bez crnih hvataljki), jedno levo jedno desno */
    .grip{order:1;flex:1;min-width:0;background:transparent;box-shadow:none;border-radius:0;
      flex-direction:row;justify-content:center;align-items:center;padding:8px 4px 0;}
    .rbtn.round{width:clamp(58px,16vw,76px);height:clamp(58px,16vw,76px);font-size:24px;}
  }

</style>
</head>
<body>
  <button id="installBtn" class="install-fab" hidden>⬇ Instaliraj</button>
  <div class="device">
    <div class="grip">
      <div class="decals"><span>🚁</span><span>🏊</span><span>🐠</span><span>🪸</span><span>🌿</span></div>
      <div><button class="rbtn round" id="left" aria-label="levo">◄</button><div class="glabel">LEFT</div></div>
    </div>

    <div class="center">
      <div class="notes">🎵 ♪ ♫ 🎶 ♩ 🎼</div>
      <div class="screen-frame">
        <div class="screen"><svg id="lcd" viewBox="0 0 460 432" aria-label="SUBMARINE LCD ekran"></svg></div>
      </div>
      <div class="banner">SUBMARINE</div>
      <div class="bars">
        <div class="bartn"><button class="rbtn pill" id="start"></button><small>S/S</small></div>
        <div class="bartn"><button class="rbtn pill" id="game"></button><small>GAME 1/2</small></div>
      </div>
      <div class="hint">◄ ► pomeraj podmornicu i hvataj ronioce &nbsp;·&nbsp; S/S = start / pauza &nbsp;·&nbsp; GAME 1/2 = Torpedo igra</div>
    </div>

    <div class="grip">
      <div class="decals"><span>🚤</span><span>🚢</span><span>🐟</span><span>🐙</span><span>🌊</span></div>
      <div><button class="rbtn round" id="right" aria-label="desno">►</button><div class="glabel">RIGHT</div></div>
    </div>
  </div>

function S(tag,a={}){const e=document.createElementNS(NS,tag);for(const k in a)e.setAttribute(k,a[k]);return e;}
function on(id,st){const el=document.getElementById(id);if(el)el.classList.toggle("on",!!st);}
function add(g,tag,a){g.appendChild(S(tag,a));return g;}
function silo(id,cx,cy){return S("g",{id,class:"lcd-seg",transform:`translate(${cx},${cy})`});}
function bar(x1,y1,x2,y2,hw){const dx=x2-x1,dy=y2-y1,L=Math.hypot(dx,dy)||1,px=-dy/L*hw,py=dx/L*hw;
  return `${x1+px},${y1+py} ${x2+px},${y2+py} ${x2-px},${y2-py} ${x1-px},${y1-py}`;}

[[55,416],[210,420],[360,414],[150,428],[300,426]].forEach(([x,y])=>

/* --- status: GAME A/B, MISS lica, sat/skor, FUEL --- */

/* --- helikopteri: razlicite visine (ne u istoj liniji) --- */
const HELI_BOB=[-7,6,-4,9,-6];
const HELI_TILT=[-13,11,-9,15,-12];          // nagnut pod uglom dok izbacuje ronioca (ne horizontalan)
COLS.forEach((x,i)=>svg.appendChild(heli(`heli${i}`,x,HELI_Y+HELI_BOB[i],HELI_TILT[i])));

/* --- 8 nivoa ronioca: razbacani levo-desno i gore-dole (leluja kao voda) ---
   svaka kolona je blaga vijugava S-linija (razlicita faza), pa ronilac
   dok tone kroz nivoe sam vijuga; pri dnu se priblizava svojoj podmornici. */
function swayX(lv,i,n){const amp=8+11*(1-lv/Math.max(1,n-1)); return amp*Math.sin(lv*0.95 + i*2.1);}
function bobY(lv,i){return 7*Math.sin(lv*1.7 + i*1.15);}
function diveAngle(lv,i){return 30+18*Math.abs(Math.sin(lv*1.25+i*2.3));}   // 30..48° nadole (vise horizontalno)
COLS.forEach((x,i)=>{ const n=COLDEPTH[i];
  for(let lv=0;lv<n;lv++){ const y=DTOP + lv*(DBOT-DTOP)/Math.max(1,n-1);
    const vi=(lv*5 + i*7 + (lv%3)*2) % DIVER_PATHS.length; // svih 18 poza, razbijeno po koloni i dubini
    const flip=((lv+i)%2)?-1:1;                      // glava cas levo, cas desno
    const rot=flip*(24 + ((lv*13 + i*17) % 31));     // 24..54 stepena, nisu svi pod istim uglom
    svg.appendChild(diverFig(`dv${lv}_${i}`, x+swayX(lv,i,n), y+bobY(lv,i), rot, vi, flip)); }});

COLS.forEach((x,i)=>svg.appendChild(sub(`sub${i}`,x,SUB_Y)));

/* "potonuo" ronilac na samom dnu — zasvetli kad promašiš (padne skroz na dno) */
COLS.forEach((x,i)=>svg.appendChild(diverFig(`floor${i}`, x, 364, (i%2?-1:1)*12, (i*5)%DIVER_PATHS.length, i%2?-1:1)));

const msg=S("text",{id:"msg",class:"lcd-msg",x:230,y:236});

/* =========================================================
   ZVUK
   ========================================================= */
let AC=null;
function audioInit(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(AC&&AC.state==="suspended")AC.resume();}
function tone(f,dur,type="square",vol=0.16,delay=0){if(!AC)return;const t=AC.currentTime+delay;
  const o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(AC.destination);
  o.start(t);o.stop(t+dur+0.03);}
const sndMove =()=>tone(880,0.03,"square",0.05);
const sndCatch=()=>{tone(660,0.06,"square",0.15);tone(990,0.10,"square",0.15,0.06);};
const sndHit  =()=>{tone(200,0.18,"sawtooth",0.17);tone(140,0.22,"sawtooth",0.15,0.05);};
const sndStart=()=>{tone(523,0.08,"square",0.13);tone(659,0.08,"square",0.13,0.09);tone(784,0.13,"square",0.13,0.18);};
const sndOver =()=>{tone(440,0.14,"square",0.15);tone(330,0.16,"square",0.15,0.14);tone(220,0.32,"square",0.15,0.30);};

/* ===== Melodija "London Bridge Is Falling Down" — jedna nota po potezu helikoptera ===== */
/* "piezo" beeper: square -> waveshaper(hard-clip) -> highpass; parametri u TUNE.
   MELODY je u oktavi 4; stvarna visina = f * TUNE.octMul (octMul 4 => oktava 6). */
const TUNE={octMul:2.5, dist:18, hp:1950, vol:0.085, tempo:650};   // naštelovano tunerom
const N={D4:293.66,E4:329.63,Fs4:369.99,G4:392.00,A4:440.00,B4:493.88};
const MELODY=[N.A4,N.B4,N.A4,N.G4,N.Fs4,N.G4,N.A4, N.E4,N.Fs4,N.G4, N.Fs4,N.G4,N.A4,
              N.A4,N.B4,N.A4,N.G4,N.Fs4,N.G4,N.A4, N.E4,N.A4,N.Fs4,N.D4];
function makeCurve(d){const n=256,c=new Float32Array(n);for(let i=0;i<n;i++){const x=i/(n-1)*2-1;c[i]=Math.tanh(x*d);}return c;}
let PIEZO_CURVE=makeCurve(TUNE.dist);
function piezo(f,dur){
  if(!AC)return; const t=AC.currentTime;
  const o=AC.createOscillator(); o.type="square"; o.frequency.setValueAtTime(f*TUNE.octMul,t);
  const sh=AC.createWaveShaper(); sh.curve=PIEZO_CURVE; sh.oversample="2x";
  const hp=AC.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=TUNE.hp;
  const g=AC.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(TUNE.vol,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+Math.max(0.05,dur));
  o.connect(sh); sh.connect(hp); hp.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t+dur+0.03);
}
let melIdx=0;
function playMelodyStep(){
  const f=MELODY[melIdx]; melIdx=(melIdx+1)%MELODY.length;
  piezo(f, Math.min(0.30, currentDelay()/1000*0.6));   // krati se kako se ubrzava
}
/* cela melodija normalnim tempom — odsvira se kad se pogine (game over) */
function playMelodyFull(dt){
  clearIntro();
  let t=0;
  MELODY.forEach(f=>{ introTimers.push(setTimeout(()=>piezo(f, Math.min(0.30, dt/1000*0.7)), t)); t+=dt; });
}
/* Uvod = isečak pesme (start.mp3, 29–35s); London Bridge ide tek u igri */
let introTimers=[], startAudio=null;
function stopStartAudio(){ if(startAudio){ try{startAudio.pause();}catch(e){} startAudio=null; } }
function clearIntro(){ introTimers.forEach(clearTimeout); introTimers=[]; stopStartAudio(); }
function playIntroThen(cb){
  clearIntro();
  let done=false; const fire=()=>{ if(done)return; done=true; cb(); };
  try{
    startAudio=new Audio("start.mp3");
    startAudio.addEventListener("ended",fire,{once:true});
    const p=startAudio.play(); if(p&&p.catch)p.catch(()=>{});
  }catch(e){}
  introTimers.push(setTimeout(fire, 6600));        // fallback pa kreće igra (London Bridge)
}

/* =========================================================
   LOGIKA — RESCUE, 8 nivoa ronioca
   ========================================================= */
const state={running:false,paused:false,intro:false,score:0,lives:3,subCol:2,heliPos:0,heliDir:1,fallers:[],sinkers:[],tick:0};

function renderField(){
  for(let i=0;i<5;i++){on(`heli${i}`,false);on(`sub${i}`,false);on(`floor${i}`,false);
    for(let lv=0;lv<MAXLV;lv++)on(`dv${lv}_${i}`,false);}
  if(state.running)on(`heli${state.heliPos}`,true);
  state.fallers.forEach(f=>on(`dv${f.row-1}_${f.col}`,true));   // row 1..8 -> nivo 0..7
  (state.sinkers||[]).forEach(s=>on(`floor${s.col}`,true));      // potonuli na dnu
  on(`sub${state.subCol}`,state.running);
}
function renderStatus(){
  const s=Math.min(9999,Math.max(0,state.score)).toString().padStart(4,"0");
  for(let i=0;i<4;i++)setDigit(`d${i}`,+s[i]);
  for(let i=0;i<3;i++)on(`life${i}`,i<state.lives);
}
function render(){renderField();renderStatus();}
function setMsg(t,blink){const m=document.getElementById("msg");m.textContent=t;
  m.classList.toggle("on",!!t);m.classList.toggle("blink",!!blink);}
function loseLife(){state.lives--; if(state.lives<=0){gameOver();} else {sndHit();}}

function currentDelay(){return Math.max(380,TUNE.tempo-Math.floor(state.score/100)*35);}  // start = TUNE.tempo
let timer=null;
function scheduleNext(){clearTimeout(timer);timer=setTimeout(step,currentDelay());}
function rescueTick(f){return state.tick + (COLDEPTH[f.col]-f.row+1);}
function canAddFaller(col){
  const plan=state.fallers.map(f=>({col:f.col,t:rescueTick(f)}));
  plan.push({col,t:state.tick+COLDEPTH[col]});
  plan.sort((a,b)=>a.t-b.t || Math.abs(a.col-state.subCol)-Math.abs(b.col-state.subCol));
  let pos=state.subCol, t=state.tick;
  for(const p of plan){
    const gap=p.t-t;
    if(gap<Math.abs(p.col-pos))return false;
    pos=p.col; t=p.t;
  }
  return true;
}
function startGame(){
  audioInit();
  clearIntro(); clearTimeout(timer);
  Object.assign(state,{running:true,paused:false,intro:true,score:0,lives:3,subCol:2,heliPos:0,heliDir:1,fallers:[],sinkers:[],tick:0});
  setMsg("",false); render();
  playIntroThen(()=>{                       // prvo cela melodija, pa kreće helikopter
    if(!state.running)return;
    state.intro=false; melIdx=0; playMelodyStep(); scheduleNext();
  });
}
function togglePause(){
  if(!state.running||state.intro)return;    // ne pauziraj tokom uvodne svirke
  state.paused=!state.paused;
  if(state.paused){ clearTimeout(timer); setMsg("PAUSE",true); }
  else { setMsg("",false); scheduleNext(); }
}
function gameOver(){state.running=false;state.intro=false;state.lives=0;clearTimeout(timer);timer=null;
  state.fallers=[];state.sinkers=[];render();setMsg("GAME OVER",true);
  playMelodyFull(300);}                    // na smrt odsvira celu melodiju normalnim tempom

function step(){
  if(state.intro)return;                    // dok traje uvodna svirka, igra još ne ide
  state.tick++;
  state.sinkers.forEach(s=>s.t--); state.sinkers=state.sinkers.filter(s=>s.t>0);  // potonuli nestaju
  state.fallers.forEach(f=>f.row++);
  const resolved=state.fallers.filter(f=>f.row>COLDEPTH[f.col]);  // prosao kroz sve nivoe SVOJE kolone
  state.fallers=state.fallers.filter(f=>f.row<=COLDEPTH[f.col]);
  resolved.forEach(f=>{
    if(state.subCol===f.col){state.score+=10;sndCatch();}
    else{ loseLife(); state.sinkers.push({col:f.col,t:3}); }   // promašaj -> ronilac potone na dno
  });
  if(!state.running)return render();

  state.heliPos+=state.heliDir;
  if(state.heliPos>=4){state.heliPos=4;state.heliDir=-1;}
  if(state.heliPos<=0){state.heliPos=0;state.heliDir=1;}
  playMelodyStep();                       // jedna nota po pomeranju helikoptera (brže kako ubrzava)

  // Izbaci ronioca samo ako buduci redosled spasavanja ostaje dohvatljiv.
  if(state.tick%3===0 && !state.fallers.some(f=>f.col===state.heliPos && f.row<=1) && canAddFaller(state.heliPos))
    state.fallers.push({col:state.heliPos,row:1});

  render();
  if(state.running)scheduleNext();
}

/* ===== KONTROLE ===== */
function moveSub(d){if(!state.running||state.intro)return;
  const p=state.subCol;state.subCol=Math.max(0,Math.min(4,state.subCol+d));
  if(state.subCol!==p)sndMove();render();}

document.getElementById("left").onclick =()=>moveSub(-1);
document.getElementById("right").onclick=()=>moveSub(1);
document.getElementById("start").onclick=()=>{ state.running ? togglePause() : startGame(); };  // S/S = start / pauza
document.getElementById("game").onclick =()=>location.href="torpedo.html";  // GAME 1/2 -> druga igra

window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft"){moveSub(-1);e.preventDefault();}
  else if(e.key==="ArrowRight"){moveSub(1);e.preventDefault();}
  else if(e.key==="Enter"||e.key===" "){ state.running ? togglePause() : startGame(); e.preventDefault();}
},{passive:false});

render();
setMsg("PRESS START",true);

/* ===== PWA: service worker ===== */
if("serviceWorker" in navigator)
  window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js",{updateViaCache:"none"}).catch(()=>{}));

/* ===== PWA: install dugme ===== */
(function(){
  const btn=document.getElementById("installBtn"); if(!btn)return;
  const installed = matchMedia("(display-mode:standalone)").matches || navigator.standalone;
  if(installed){ btn.hidden=true; return; }
  if(window._dip) btn.hidden=false;                 // event već stigao (rana registracija)
  btn.addEventListener("click",async()=>{
    if(!window._dip)return;
    window._dip.prompt();
    try{ await window._dip.userChoice; }catch(e){}
    window._dip=null; btn.hidden=true;
  });
  window.addEventListener("appinstalled",()=>{ btn.hidden=true; window._dip=null; });
})();
</script>
